services:
  - type: web
    name: glass-box-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: LLM_TIMEOUT
        value: "120"
      - key: FRONTEND_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
